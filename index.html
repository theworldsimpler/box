<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <meta
    name="description"
    content="Box modular habitat platform across Earth, Moon and Mars deployment environments."
  >

  <title>Box | Earth</title>

  <style>
    :root {
      --black: #000;
      --white: #fff;
      --gray-100: #f2f2f2;
      --gray-200: #dedede;
      --gray-600: #555;
      --accent: #0071e3;
      --accent-hover: #0077ed;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      background: var(--white);
      color: var(--black);
      font-family:
        Inter,
        -apple-system,
        BlinkMacSystemFont,
        "Segoe UI",
        Helvetica,
        Arial,
        sans-serif;
    }

    body {
      padding: 40px;
      line-height: 1.5;
    }

    button,
    a {
      font: inherit;
    }

    button {
      color: inherit;
    }

    ::selection {
      background: var(--accent);
      color: var(--white);
    }

    .world-page,
    .project-footer {
      width: min(1200px, 100%);
      margin: 0 auto;
    }

    .world-page[hidden] {
      display: none;
    }

    .world-page {
      animation: reveal 240ms ease;
    }

    @keyframes reveal {
      from {
        opacity: 0;
        transform: translateY(8px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .project-header {
      margin-bottom: 112px;
    }

    .header-index {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
      margin-bottom: 24px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--accent);
      color: var(--accent);
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .header-row {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 28px;
    }

    .world-nav {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding-top: 10px;
    }

    .world-nav a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 76px;
      padding: 9px 14px;
      border: 1px solid var(--gray-200);
      border-radius: 999px;
      color: var(--gray-600);
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-decoration: none;
      text-transform: uppercase;
      transition: 180ms ease;
    }

    .world-nav a:hover,
    .world-nav a:focus-visible {
      border-color: var(--accent);
      color: var(--accent);
      outline: none;
    }

    .world-nav a[aria-current="page"] {
      border-color: var(--accent);
      background: var(--accent);
      color: var(--white);
    }

    h1,
    h2,
    h3 {
      margin-top: 0;
      letter-spacing: -0.04em;
    }

    h1 {
      max-width: 900px;
      margin: 0 0 32px;
      font-size: clamp(4rem, 12vw, 9rem);
      font-weight: 700;
      line-height: 0.82;
    }

    .project-intro {
      max-width: 800px;
      margin: 0;
      color: var(--gray-600);
      font-size: clamp(1rem, 2vw, 1.2rem);
      line-height: 1.65;
    }

    .carousel-section {
      margin-bottom: 140px;
    }

    .carousel {
      position: relative;
      width: 100%;
      overflow: hidden;
      background: var(--gray-100);
      outline: none;
    }

    .carousel:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 4px;
    }

    .carousel-track {
      position: relative;
      width: 100%;
      aspect-ratio: 3 / 2;
    }

    .slide {
      position: absolute;
      inset: 0;
      margin: 0;
      opacity: 0;
      visibility: hidden;
      transition:
        opacity 400ms ease,
        visibility 400ms ease;
    }

    .slide.active {
      opacity: 1;
      visibility: visible;
    }

    .slide img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
    }

    .image-number,
    .carousel-position {
      position: absolute;
      top: 20px;
      z-index: 2;
      padding: 8px 11px;
      background: var(--accent);
      color: var(--white);
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }

    .image-number {
      left: 20px;
    }

    .carousel-position {
      right: 20px;
      min-width: 72px;
      text-align: center;
    }

    .carousel-button {
      position: absolute;
      top: 50%;
      z-index: 3;
      display: grid;
      width: 48px;
      height: 48px;
      padding: 0;
      border: 0;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.9);
      color: var(--black);
      font-size: 26px;
      cursor: pointer;
      place-items: center;
      transform: translateY(-50%);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      transition:
        background 180ms ease,
        color 180ms ease,
        transform 180ms ease;
    }

    .carousel-button:hover {
      background: var(--accent-hover);
      color: var(--white);
      transform: translateY(-50%) scale(1.05);
    }

    .carousel-button:focus-visible,
    .carousel-dot:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 3px;
    }

    .carousel-button.previous {
      left: 18px;
    }

    .carousel-button.next {
      right: 18px;
    }

    .carousel-footer {
      display: grid;
      grid-template-columns: 100px minmax(0, 1fr) auto;
      gap: 24px;
      align-items: start;
      padding-top: 22px;
    }

    .caption-number {
      color: var(--accent);
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.1em;
    }

    .caption-title {
      margin: 0 0 8px;
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: -0.02em;
    }

    .image-description {
      max-width: 820px;
      margin: 0;
      color: var(--gray-600);
      font-size: 0.94rem;
      line-height: 1.65;
    }

    .carousel-dots {
      display: flex;
      flex-shrink: 0;
      justify-content: center;
      gap: 9px;
      padding-top: 7px;
    }

    .carousel-dot {
      display: grid;
      width: 28px;
      height: 28px;
      padding: 0;
      border: 1px solid var(--gray-200);
      border-radius: 50%;
      background: transparent;
      color: var(--gray-600);
      font-size: 0.64rem;
      font-weight: 600;
      cursor: pointer;
      place-items: center;
      transition:
        background 180ms ease,
        color 180ms ease,
        border-color 180ms ease;
    }

    .carousel-dot:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .carousel-dot.active {
      border-color: var(--accent);
      background: var(--accent);
      color: var(--white);
    }

    /*
      The heading, description and priorities appear
      after each carousel.
    */
    .section-heading {
      display: grid;
      grid-template-columns: 100px minmax(0, 1fr);
      gap: 32px;
      margin-top: 48px;
      padding-top: 22px;
      border-top: 1px solid var(--accent);
    }

    .section-number {
      color: var(--accent);
      font-size: clamp(2rem, 4vw, 3.5rem);
      font-weight: 600;
      letter-spacing: -0.06em;
      line-height: 1;
    }

    .section-copy {
      max-width: 850px;
    }

    .section-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px 18px;
      margin-bottom: 12px;
      color: var(--accent);
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .section-copy h2 {
      margin-bottom: 14px;
      font-size: clamp(2rem, 5vw, 4rem);
      font-weight: 600;
      line-height: 0.95;
    }

    .section-description {
      max-width: 820px;
      margin: 0;
      color: var(--gray-600);
      font-size: 1rem;
      line-height: 1.7;
    }

    .numbered-priorities {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      margin: 28px 0 0;
      border-top: 1px solid var(--gray-200);
      border-bottom: 1px solid var(--gray-200);
    }

    .priority {
      padding: 18px 18px 18px 0;
      border-right: 1px solid var(--gray-200);
    }

    .priority:not(:first-child) {
      padding-left: 18px;
    }

    .priority:last-child {
      border-right: 0;
    }

    .priority-number {
      display: block;
      margin-bottom: 12px;
      color: var(--accent);
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.1em;
    }

    .priority-name {
      display: block;
      font-size: 0.84rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .project-footer {
      display: grid;
      grid-template-columns: 100px minmax(0, 1fr);
      gap: 32px;
      margin-top: 30px;
      padding: 24px 0 60px;
      border-top: 1px solid var(--accent);
    }

    .footer-number {
      color: var(--accent);
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.1em;
    }

    .footer-copy {
      max-width: 760px;
      margin: 0;
      color: var(--gray-600);
      font-size: 0.82rem;
      line-height: 1.6;
    }

    @media (max-width: 800px) {
      body {
        padding: 24px 16px;
      }

      .project-header {
        margin-bottom: 80px;
      }

      .header-index,
      .header-row {
        align-items: flex-start;
        flex-direction: column;
      }

      h1 {
        margin-bottom: 24px;
      }

      .world-nav {
        padding-top: 0;
      }

      .carousel-section {
        margin-bottom: 88px;
      }

      .carousel-track {
        aspect-ratio: 4 / 3;
      }

      .carousel-button {
        width: 40px;
        height: 40px;
      }

      .carousel-button.previous {
        left: 10px;
      }

      .carousel-button.next {
        right: 10px;
      }

      .image-number {
        top: 12px;
        left: 12px;
      }

      .carousel-position {
        top: 12px;
        right: 12px;
      }

      .carousel-footer,
      .section-heading,
      .project-footer {
        grid-template-columns: 1fr;
      }

      .carousel-footer {
        gap: 10px;
      }

      .carousel-dots {
        justify-content: flex-start;
        margin-top: 8px;
      }

      .section-heading {
        gap: 18px;
      }

      .numbered-priorities {
        grid-template-columns: 1fr;
      }

      .priority,
      .priority:not(:first-child) {
        padding: 16px 0;
        border-right: 0;
        border-bottom: 1px solid var(--gray-200);
      }

      .priority:last-child {
        border-bottom: 0;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      html {
        scroll-behavior: auto;
      }

      .world-page,
      .slide,
      .carousel-button,
      .carousel-dot {
        animation: none;
        transition: none;
      }
    }
  </style>
</head>

                  "The sleeping zone is oriented toward the primary glazed elevation while preserving clear circulation and integrated wall storage."
              },

              {
                src: "23.png",
                number: "02.2",
                title: "Mars wet-room core",
                alt: "Compact bathroom inside the Mars habitat",

                description:
                  "The wet-room groups waterproof surfaces, plumbing, ventilation and access points in a single serviceable zone."
              },

              {
                src: "24.png",
                number: "02.3",
                title: "Mars galley",
                alt: "Minimal galley kitchen looking onto a Mars landscape",

                description:
                  "The galley combines parallel work surfaces, integrated appliances and full-height storage within a narrow footprint."
              }
            ]
          },

          {
            number: "03",

            meta: [
              "03 / 03",
              "03 Mars systems views",
              "Layer 03"
            ],

            title: "Mars utility systems",

            description:
              "The technical layer consolidates thermal management, ventilation, fluid handling, electrical distribution, sensing and control equipment into a replaceable service package.",

            priorities: [
              ["03.1", "Utility module"],
              ["03.2", "Hydraulic network"],
              ["03.3", "Air and controls"]
            ],

            aria: "Mars utility systems image gallery",

            images: [
              {
                src: "25.png",
                number: "03.1",
                title: "Mars utility module",
                alt: "Complete integrated metallic utility module",

                description:
                  "A system-level view combines hydraulic circuits, storage vessels, controls and air equipment within a defined mechanical package."
              },

              {
                src: "26.png",
                number: "03.2",
                title: "Mars hydraulic network",
                alt: "Detailed hydraulic distribution components",

                description:
                  "Centralized manifolds, valves, instruments and service connections improve inspection access and support fault isolation."
              },

              {
                src: "27.png",
                number: "03.3",
                title: "Mars air and control zone",
                alt: "Air-handling and electrical-control equipment",

                description:
                  "Organized electrical enclosures, conduit runs and ducted thermal equipment are grouped for structured maintenance and replacement."
              }
            ]
          }
        ]
      }
    };

    const worldOrder = [
      "earth",
      "moon",
      "mars"
    ];

    const app = document.querySelector("#app");

    const escapeHTML = (value) =>
      String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");

    function createNav(activeWorld) {
      return `
        <nav
          class="world-nav"
          aria-label="Deployment environments"
        >
          ${worldOrder
            .map(
              (world) => `
                <a
                  href="#${world}"
                  data-world-link="${world}"
                  ${
                    world === activeWorld
                      ? 'aria-current="page"'
                      : ""
                  }
                >
                  ${escapeHTML(worlds[world].label)}
                </a>
              `
            )
            .join("")}
        </nav>
      `;
    }

    function createSection(section) {
      return `
        <section class="carousel-section">
          <div
            class="carousel"
            aria-label="${escapeHTML(section.aria)}"
            tabindex="0"
          >
            <div class="carousel-track">
              ${section.images
                .map(
                  (image, index) => `
                    <figure
                      class="slide${index === 0 ? " active" : ""}"
                      data-number="${escapeHTML(image.number)}"
                      data-title="${escapeHTML(image.title)}"
                      data-description="${escapeHTML(
                        image.description
                      )}"
                      ${
                        index === 0
                          ? 'aria-hidden="false"'
                          : 'aria-hidden="true"'
                      }
                    >
                      <span class="image-number">
                        ${escapeHTML(image.number)}
                      </span>

                      <img
                        src="${escapeHTML(image.src)}"
                        alt="${escapeHTML(image.alt)}"
                        loading="lazy"
                        decoding="async"
                      >
                    </figure>
                  `
                )
                .join("")}
            </div>

            <div
              class="carousel-position"
              aria-live="polite"
            >
              01 / 03
            </div>

            <button
              class="carousel-button previous"
              type="button"
              aria-label="Show previous image"
            >
              &#8249;
            </button>

            <button
              class="carousel-button next"
              type="button"
              aria-label="Show next image"
            >
              &#8250;
            </button>
          </div>

          <div class="carousel-footer">
            <div class="caption-number">
              ${escapeHTML(section.images[0].number)}
            </div>

            <div>
              <h3 class="caption-title">
                ${escapeHTML(section.images[0].title)}
              </h3>

              <p
                class="image-description"
                aria-live="polite"
              >
                ${escapeHTML(section.images[0].description)}
              </p>
            </div>

            <div
              class="carousel-dots"
              aria-label="Choose an image"
            ></div>
          </div>

          <div class="section-heading">
            <div class="section-number">
              ${escapeHTML(section.number)}
            </div>

            <div class="section-copy">
              <div class="section-meta">
                ${section.meta
                  .map(
                    (item) =>
                      `<span>${escapeHTML(item)}</span>`
                  )
                  .join("")}
              </div>

              <h2>
                ${escapeHTML(section.title)}
              </h2>

              <p class="section-description">
                ${escapeHTML(section.description)}
              </p>

              <div class="numbered-priorities">
                ${section.priorities
                  .map(
                    ([number, name]) => `
                      <div class="priority">
                        <span class="priority-number">
                          ${escapeHTML(number)}
                        </span>

                        <span class="priority-name">
                          ${escapeHTML(name)}
                        </span>
                      </div>
                    `
                  )
                  .join("")}
              </div>
            </div>
          </div>
        </section>
      `;
    }

    function createWorldPage(worldKey) {
      const world = worlds[worldKey];

      return `
        <div
          class="world-page"
          data-world="${worldKey}"
          aria-label="${escapeHTML(
            world.label
          )} deployment page"
          ${worldKey === "earth" ? "" : "hidden"}
        >
          <header class="project-header">
            <div class="header-index">
              <span>
                ${escapeHTML(world.index)}
              </span>

              <span>
                ${escapeHTML(world.stage)}
              </span>
            </div>

            <div class="header-row">
              <div>
                <h1>Box</h1>

                <p class="project-intro">
                  ${escapeHTML(world.intro)}
                </p>
              </div>

              ${createNav(worldKey)}
            </div>
          </header>

          <main>
            ${world.sections
              .map(createSection)
              .join("")}
          </main>
        </div>
      `;
    }

    app.innerHTML = worldOrder
      .map(createWorldPage)
      .join("");

    function formatNumber(number) {
      return String(number).padStart(2, "0");
    }

    function initializeCarousel(section) {
      const carousel =
        section.querySelector(".carousel");

      const slides = [
        ...section.querySelectorAll(".slide")
      ];

      const previousButton =
        section.querySelector(".previous");

      const nextButton =
        section.querySelector(".next");

      const dotsContainer =
        section.querySelector(".carousel-dots");

      const description =
        section.querySelector(".image-description");

      const captionTitle =
        section.querySelector(".caption-title");

      const captionNumber =
        section.querySelector(".caption-number");

      const position =
        section.querySelector(".carousel-position");

      let currentIndex = 0;
      let touchStartX = 0;

      const dots = slides.map((slide, index) => {
        const dot =
          document.createElement("button");

        dot.type = "button";
        dot.className = "carousel-dot";
        dot.textContent =
          formatNumber(index + 1);

        dot.setAttribute(
          "aria-label",
          `Show image ${index + 1} of ${slides.length}`
        );

        dot.addEventListener("click", () => {
          showSlide(index);
        });

        dotsContainer.appendChild(dot);

        return dot;
      });

      function showSlide(index) {
        currentIndex =
          (index + slides.length) %
          slides.length;

        slides.forEach(
          (slide, slideIndex) => {
            const isActive =
              slideIndex === currentIndex;

            slide.classList.toggle(
              "active",
              isActive
            );

            slide.setAttribute(
              "aria-hidden",
              String(!isActive)
            );
          }
        );

        dots.forEach((dot, dotIndex) => {
          const isActive =
            dotIndex === currentIndex;

          dot.classList.toggle(
            "active",
            isActive
          );

          dot.setAttribute(
            "aria-current",
            isActive ? "true" : "false"
          );
        });

        const currentSlide =
          slides[currentIndex];

        captionNumber.textContent =
          currentSlide.dataset.number;

        captionTitle.textContent =
          currentSlide.dataset.title;

        description.textContent =
          currentSlide.dataset.description;

        position.textContent =
          `${formatNumber(
            currentIndex + 1
          )} / ${formatNumber(slides.length)}`;
      }

      previousButton.addEventListener(
        "click",
        () => {
          showSlide(currentIndex - 1);
        }
      );

      nextButton.addEventListener(
        "click",
        () => {
          showSlide(currentIndex + 1);
        }
      );

      carousel.addEventListener(
        "keydown",
        (event) => {
          if (event.key === "ArrowLeft") {
            event.preventDefault();
            showSlide(currentIndex - 1);
          }

          if (event.key === "ArrowRight") {
            event.preventDefault();
            showSlide(currentIndex + 1);
          }
        }
      );

      carousel.addEventListener(
        "touchstart",
        (event) => {
          touchStartX =
            event.changedTouches[0].clientX;
        },
        {
          passive: true
        }
      );

      carousel.addEventListener(
        "touchend",
        (event) => {
          const distance =
            event.changedTouches[0].clientX -
            touchStartX;

          if (Math.abs(distance) < 50) {
            return;
          }

          showSlide(
            distance > 0
              ? currentIndex - 1
              : currentIndex + 1
          );
        },
        {
          passive: true
        }
      );

      showSlide(0);
    }

    document
      .querySelectorAll(".carousel-section")
      .forEach(initializeCarousel);

    function showWorld(
      requestedWorld,
      updateHash = false
    ) {
      const world =
        worldOrder.includes(requestedWorld)
          ? requestedWorld
          : "earth";

      document
        .querySelectorAll(".world-page")
        .forEach((page) => {
          const isActive =
            page.dataset.world === world;

          page.hidden = !isActive;

          page.setAttribute(
            "aria-hidden",
            String(!isActive)
          );
        });

      document
        .querySelectorAll("[data-world-link]")
        .forEach((link) => {
          const isActive =
            link.dataset.worldLink === world;

          if (isActive) {
            link.setAttribute(
              "aria-current",
              "page"
            );
          } else {
            link.removeAttribute(
              "aria-current"
            );
          }
        });

      document.title =
        `Box | ${worlds[world].label}`;

      if (
        updateHash &&
        location.hash !== `#${world}`
      ) {
        history.pushState(
          {
            world
          },
          "",
          `#${world}`
        );
      }

      window.scrollTo({
        top: 0,
        behavior: "smooth"
      });
    }

    document.addEventListener(
      "click",
      (event) => {
        const link =
          event.target.closest(
            "[data-world-link]"
          );

        if (!link) {
          return;
        }

        event.preventDefault();

        showWorld(
          link.dataset.worldLink,
          true
        );
      }
    );

    window.addEventListener(
      "popstate",
      () => {
        showWorld(
          location.hash.slice(1) ||
          "earth"
        );
      }
    );

    showWorld(
      location.hash.slice(1) ||
      "earth"
    );
  </script>
</body>
</html>
